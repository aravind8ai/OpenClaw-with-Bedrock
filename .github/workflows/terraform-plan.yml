name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-plan.yml'
      - '.github/workflows/terraform-apply.yml'

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  STACK_NAME: ${{ vars.STACK_NAME || 'chatbot-stack' }}
  TF_WORKING_DIR: terraform

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STACK_NAME }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="stack_name=${{ env.STACK_NAME }}" \
            -var="openclaw_model=${{ vars.OPENCLAW_MODEL || 'global.amazon.nova-2-lite-v1:0' }}" \
            -var="instance_type=${{ vars.INSTANCE_TYPE || 'c7g.large' }}" \
            -var="create_vpc_endpoints=${{ vars.CREATE_VPC_ENDPOINTS || 'true' }}" \
            -var="enable_monitoring=${{ vars.ENABLE_MONITORING || 'true' }}" \
            -input=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.slice(0, maxLen) + '\n\n... (truncated)'
              : plan;

            const fmtIcon  = '${{ steps.fmt.outcome }}'      === 'success' ? '✅' : '⚠️';
            const initIcon = '${{ steps.init.outcome }}'     === 'success' ? '✅' : '❌';
            const valIcon  = '${{ steps.validate.outcome }}' === 'success' ? '✅' : '❌';
            const planIcon = '${{ steps.plan.outcome }}'     === 'success' ? '✅' : '❌';

            const body = [
              '## Terraform Plan',
              '',
              `| Step | Status |`,
              `|------|--------|`,
              `| Format | ${fmtIcon} \`${{ steps.fmt.outcome }}\` |`,
              `| Init   | ${initIcon} \`${{ steps.init.outcome }}\` |`,
              `| Validate | ${valIcon} \`${{ steps.validate.outcome }}\` |`,
              `| Plan   | ${planIcon} \`${{ steps.plan.outcome }}\` |`,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```hcl',
              truncated,
              '```',
              '</details>',
              '',
              `*Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.user.login === 'github-actions[bot]' && c.body.startsWith('## Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 5
