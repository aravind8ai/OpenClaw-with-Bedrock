name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      stack_name:
        description: 'Stack name to destroy (must match the deployed stack)'
        required: true
        default: 'chatbot-stack'
      confirm:
        description: 'Type "destroy" to confirm'
        required: true

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "us-east-1"
  STACK_NAME: ${{ vars.STACK_NAME || 'chatbot-stack' }}
  TF_WORKING_DIR: terraform

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-main
  cancel-in-progress: false

jobs:
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Confirm destroy input
        if: github.event.inputs.confirm != 'destroy'
        run: |
          echo "Confirmation input was '${{ github.event.inputs.confirm }}', expected 'destroy'. Aborting."
          exit 1

      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ github.event.inputs.stack_name }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -input=false

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="stack_name=${{ github.event.inputs.stack_name }}" \
            -var="openclaw_model=${{ vars.OPENCLAW_MODEL || 'global.amazon.nova-2-lite-v1:0' }}" \
            -var="instance_type=${{ vars.INSTANCE_TYPE || 'c7g.large' }}" \
            -var="create_vpc_endpoints=${{ vars.CREATE_VPC_ENDPOINTS || 'true' }}" \
            -var="enable_monitoring=${{ vars.ENABLE_MONITORING || 'true' }}" \
            -auto-approve \
            -input=false
