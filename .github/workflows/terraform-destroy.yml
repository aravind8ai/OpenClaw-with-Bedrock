name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      stack_name:
        description: 'Stack name to destroy (must match the deployed stack)'
        required: true
        default: 'openclaw-bedrock'
      confirm:
        description: 'Type "destroy" to confirm'
        required: true

permissions:
  contents: read
  id-token: write  # OIDC auth with AWS

concurrency:
  group: terraform-main
  cancel-in-progress: false

jobs:
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Confirm destroy input
        if: github.event.inputs.confirm != 'destroy'
        run: |
          echo "Confirmation input was '${{ github.event.inputs.confirm }}', expected 'destroy'. Aborting."
          exit 1

      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=openclaw/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION || 'us-west-2' }}" \
            -input=false

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var="aws_region=${{ vars.AWS_REGION || 'us-west-2' }}" \
            -var="stack_name=${{ github.event.inputs.stack_name }}" \
            -var="openclaw_model=${{ vars.OPENCLAW_MODEL || 'global.amazon.nova-2-lite-v1:0' }}" \
            -var="instance_type=${{ vars.INSTANCE_TYPE || 'c7g.large' }}" \
            -var="create_vpc_endpoints=${{ vars.CREATE_VPC_ENDPOINTS || 'true' }}" \
            -var="enable_monitoring=${{ vars.ENABLE_MONITORING || 'true' }}" \
            -auto-approve \
            -input=false
