name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-apply.yml'
  workflow_dispatch:
    inputs:
      stack_name:
        description: 'Stack name (resource prefix)'
        required: false
        default: 'chatbot-stack'
      openclaw_model:
        description: 'Bedrock model ID'
        required: false
        default: 'global.amazon.nova-2-lite-v1:0'
      instance_type:
        description: 'EC2 instance type'
        required: false
        default: 't2.micro'

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "us-east-1"
  STACK_NAME: ${{ vars.STACK_NAME || 'chatbot-stack' }}
  TF_WORKING_DIR: terraform

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-main
  cancel-in-progress: false

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.STACK_NAME }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -input=false

      - name: Terraform Apply
        run: |
          terraform apply \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="stack_name=${{ github.event.inputs.stack_name || env.STACK_NAME }}" \
            -var="openclaw_model=${{ github.event.inputs.openclaw_model || vars.OPENCLAW_MODEL || 'global.amazon.nova-2-lite-v1:0' }}" \
            -var="instance_type=${{ github.event.inputs.instance_type || vars.INSTANCE_TYPE || 'c7g.large' }}" \
            -var="create_vpc_endpoints=${{ vars.CREATE_VPC_ENDPOINTS || 'true' }}" \
            -var="enable_monitoring=${{ vars.ENABLE_MONITORING || 'true' }}" \
            -auto-approve \
            -input=false

      - name: Show outputs
        run: terraform output
